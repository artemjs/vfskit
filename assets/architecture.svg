<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 340" width="920" height="340" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1f"/><stop offset="1" stop-color="#141d3b"/>
    </linearGradient>
    <linearGradient id="aacc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c8cff"/><stop offset="1" stop-color="#56e6c4"/>
    </linearGradient>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#5b67a6"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="918" height="338" rx="20" fill="url(#abg)" stroke="#26305a" stroke-width="1.5"/>
  <text x="40" y="48" font-size="20" font-weight="700" fill="#eef1fb">Everything is a <tspan fill="url(#aacc)">VFS</tspan></text>

  <g font-size="14" font-weight="600" text-anchor="middle">
    <!-- backends -->
    <g fill="#cdd5f3">
      <rect x="40" y="78" width="150" height="40" rx="10" fill="#141d3b" stroke="#33407a"/><text x="115" y="103">memory()</text>
      <rect x="40" y="128" width="150" height="40" rx="10" fill="#141d3b" stroke="#33407a"/><text x="115" y="153">nodeFs(dir)</text>
      <rect x="40" y="178" width="150" height="40" rx="10" fill="#141d3b" stroke="#33407a"/><text x="115" y="203">s3(client)</text>
      <rect x="40" y="228" width="150" height="40" rx="10" fill="#10182f" stroke="#2a3463" stroke-dasharray="4 4"/><text x="115" y="253" fill="#8a93c0">your store</text>
    </g>
    <text x="115" y="296" font-size="12" font-weight="500" fill="#6f79ad" text-anchor="middle">adapters</text>

    <!-- VFS core -->
    <rect x="300" y="138" width="150" height="70" rx="16" fill="#15224a" stroke="url(#aacc)" stroke-width="2"/>
    <text x="375" y="172" font-size="22" font-weight="800" fill="#eef1fb">VFS</text>
    <text x="375" y="194" font-size="12" font-weight="500" fill="#9aa6d8">one interface</text>

    <!-- middleware -->
    <g fill="#cdd5f3">
      <rect x="540" y="118" width="160" height="40" rx="10" fill="#141d3b" stroke="#33407a"/><text x="620" y="143">encrypt(vfs)</text>
      <rect x="540" y="168" width="160" height="40" rx="10" fill="#141d3b" stroke="#33407a"/><text x="620" y="193">cache(vfs)</text>
    </g>
    <text x="620" y="232" font-size="12" font-weight="500" fill="#6f79ad">middleware</text>

    <!-- bridge / client -->
    <rect x="760" y="118" width="120" height="90" rx="14" fill="#141d3b" stroke="#33407a"/>
    <text x="820" y="150" fill="#7ce6c8">serve()</text>
    <text x="820" y="172" font-size="12" fill="#9aa6d8">⇅ HTTP / WS</text>
    <text x="820" y="194" fill="#9fb0ff">remote()</text>
    <text x="820" y="232" font-size="12" font-weight="500" fill="#6f79ad">bridge → browser</text>
  </g>

  <g stroke="#5b67a6" stroke-width="2" fill="none" marker-end="url(#arr)">
    <path d="M196 98 C 250 110, 255 150, 296 160"/>
    <path d="M196 148 L 296 168"/>
    <path d="M196 198 C 250 190, 255 180, 296 178"/>
    <path d="M452 173 L 536 158"/>
    <path d="M452 173 L 536 188"/>
    <path d="M704 163 L 756 163"/>
  </g>
</svg>
